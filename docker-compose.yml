version: "3.9"

services:
  # PostgreSQL 16 - 业务核心数据库
  postgres:
    image: postgres:16-alpine
    container_name: pdmaws-postgres
    environment:
      POSTGRES_DB: pdmaws
      POSTGRES_USER: pdmaws
      POSTGRES_PASSWORD: pdmaws_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdmaws"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 7 - 会话缓存 / 消息总线 / Token 熔断计数器
  redis:
    image: redis:7-alpine
    container_name: pdmaws-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant - 向量数据库 (学术文献 RAG + Agent 记忆)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pdmaws-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
